defaults:  
  - override hydra/job_logging: disabled

domain: ???
task: ???
device: 'cpu'

replay_buffer:
  gamma: 0.99
  batch_size: 256
  buffer_size: 1_000_000

sac:
  actor_lr: 3e-4
  critic_lr: 3e-4
  alpha: 1.0
  alpha_lr: 3e-4
  tau: 0.005
  seed_timesteps: 300
  eval_interval_timesteps: 10000
  eval_episodes: 100

total_timesteps: 1_000_000

actor:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: torch.nn.LazyLinear
      out_features: 256
    - _target_: torch.nn.ReLU

    - _target_: torch.nn.LazyLinear
      out_features: 256
    - _target_: torch.nn.ReLU

critic:
  _target_: torch.nn.Sequential
  _args_:
    - _target_: torch.nn.LazyLinear
      out_features: 256
    - _target_: torch.nn.ReLU

    - _target_: torch.nn.LazyLinear
      out_features: 256
    - _target_: torch.nn.ReLU

hydra:
  run:
    dir: expert/outputs/${domain}-${task}/${now:%Y-%m-%d_%H-%M-%S}